<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


<header>
    <div class="cw-logo">
      <div class="cw-logo-drop"></div>
      <div class="cw-logo-text">
        charity: water
        <span>clean water for all</span>
      </div>
    </div>
  </header>

  <div class="game-header">
    <h1>Water <em>Drop</em></h1>
    <p>Catch clean drops · dodge the dirty ones</p>
  </div>

  <div class="score-bar">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="score-val">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Time</span>
      <span class="stat-value" id="time-val">30</span>
    </div>
    <div class="stat">
      <span class="stat-label">Lives</span>
      <span class="stat-value" id="lives-val">♥♥♥</span>
    </div>
    <div class="controls">
      <button class="btn btn-reset" id="reset-btn">↺ Reset</button>
    </div>
  </div>

  <div class="arena-wrap">
    <div id="game-container">

      <div id="overlay">
        <div id="overlay-title">💧 Water Drop</div>
        <div id="overlay-body">
          Tap the <strong class="blue">blue drops</strong> to score points.<br>
          <span class="orange">Orange drops</span> are dirty — tap them and lose a life!
        </div>
        <button id="overlay-btn">Start Game</button>
      </div>

    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
